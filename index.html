<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Core Responsive HUD</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #v { display: none; }
    #c { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    /* Lapisan Overlay untuk Scanlines */
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <video id="v" playsinline></video>
  <canvas id="c"></canvas>

  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let sparks = [];
    let buttons = [];
    const btnLabels = ["CORE", "NET", "BYPASS", "SYNC", "LINK", "AI"];
    btnLabels.forEach(label => buttons.push({ label, active: false, cooldown: 0 }));

    function createSpark(x, y) {
      for (let i = 0; i < 15; i++) {
        sparks.push({
          x, y,
          vx: (Math.random() - 0.5) * 12,
          vy: (Math.random() - 0.5) * 12,
          life: 1.0,
          color: `rgb(255, ${Math.floor(Math.random() * 150)}, 0)`
        });
      }
    }

    function drawHUD(hands, faces) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Mirror Camera
      ctx.save();
      ctx.scale(-1, 1);
      ctx.translate(-canvas.width, 0);
      ctx.globalAlpha = 0.4;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      let anchorX = canvas.width / 2;
      let anchorY = canvas.height / 2;

      // Gunakan deteksi wajah sebagai pusat jika tersedia
      if (faces && faces[0]) {
        anchorX = ((faces[0][33].x + faces[0][263].x) / 2) * canvas.width;
        anchorY = ((faces[0][33].y + faces[0][263].y) / 2) * canvas.height;
      }

      // 1. BRAIN AI CORE (PUSAT)
      ctx.strokeStyle = "#0ff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(anchorX, anchorY, 40, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(0, 255, 255, 0.1)";
      ctx.fill();
      ctx.fillStyle = "#0ff";
      ctx.font = "10px monospace";
      ctx.textAlign = "center";
      ctx.fillText("AI_CORE_ACTIVE", anchorX, anchorY - 50);

      // 2. MONITOR LAYAR KODE (RESPONSIF - LEBIH KE TENGAH)
      const mWidth = Math.min(canvas.width * 0.25, 200);
      const mHeight = 250;
      const m1x = anchorX - mWidth - 60; 
      const m1y = anchorY - 125;

      ctx.fillStyle = "rgba(0, 20, 0, 0.7)";
      ctx.fillRect(m1x, m1y, mWidth, mHeight);
      ctx.strokeStyle = "#0f0";
      ctx.strokeRect(m1x, m1y, mWidth, mHeight);
      ctx.fillStyle = "#0f0";
      ctx.textAlign = "left";
      for(let i=0; i<12; i++) {
        ctx.fillText(">> " + Math.random().toString(36).substring(7).toUpperCase(), m1x + 10, m1y + 30 + (i * 18));
      }

      // 3. MONITOR TOMBOL (RESPONSIF - LEBIH KE TENGAH)
      const m2x = anchorX + 60; 
      const m2y = anchorY - 125;
      ctx.fillStyle = "rgba(0, 20, 40, 0.7)";
      ctx.fillRect(m2x, m2y, mWidth, mHeight);
      ctx.strokeStyle = "#0ff";
      ctx.strokeRect(m2x, m2y, mWidth, mHeight);

      buttons.forEach((btn, i) => {
        const bw = mWidth - 20;
        const bh = 30;
        const bx = m2x + 10;
        const by = m2y + 25 + (i * 38);
        btn.rect = { x: bx, y: by, w: bw, h: bh };

        ctx.fillStyle = btn.cooldown > 0 ? "rgba(255, 100, 0, 0.6)" : "rgba(0, 255, 255, 0.2)";
        ctx.fillRect(bx, by, bw, bh);
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.fillText(btn.label, bx + bw/2, by + 20);
        if(btn.cooldown > 0) btn.cooldown--;
      });

      // 4. DETEKSI TANGAN & SPARK
      if (hands) {
        hands.forEach(hand => {
          const index = hand[8];
          const ix = (1 - index.x) * canvas.width;
          const iy = index.y * canvas.height;

          // Gambar Jari Digital
          ctx.fillStyle = "#0ff";
          hand.forEach(p => ctx.fillRect((1-p.x)*canvas.width, p.y*canvas.height, 3, 3));

          buttons.forEach(btn => {
            if (ix > btn.rect.x && ix < btn.rect.x + btn.rect.w && iy > btn.rect.y && iy < btn.rect.y + btn.rect.h) {
              if (btn.cooldown === 0) {
                createSpark(ix, iy);
                btn.cooldown = 15;
              }
            }
          });
        });
      }

      // Update Sparks
      sparks.forEach((s, i) => {
        s.x += s.vx; s.y += s.vy; s.life -= 0.04;
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.life;
        ctx.fillRect(s.x, s.y, 2, 2);
        if(s.life <= 0) sparks.splice(i, 1);
      });
      ctx.globalAlpha = 1.0;
    }

    // SETUP MEDIAPIPE
    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
    
    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });

    let cH = null, cF = null;
    hands.onResults(res => cH = res.multiHandLandmarks);
    faceMesh.onResults(res => cF = res.multiFaceLandmarks);

    const cam = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
        await faceMesh.send({image: video});
        drawHUD(cH, cF);
      },
      width: 1280, height: 720
    });
    cam.start();
  </script>
</body>
</html>
